<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BMI Calculator</title>
<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
  margin: 40px auto;
  max-width: 520px;
  padding: 0 15px;
  background: #000;
  color: #fff;
  line-height: 1.45;
}
h1 {
  font-size: 1.65rem;
  font-weight: 700;
  margin-bottom: 1.6rem;
  text-align: left;
  color: #fff;
}
h2 {
  font-size: 1.1rem;
  font-weight: 600;
  margin-top: 1.9rem;
  margin-bottom: 0.7rem;
  padding-bottom: 3px;
  border-bottom: 1px solid #333;
  color: #fff;
}
.input-row {
  display: flex;
  align-items: center;
  margin-bottom: 0.85rem;
}
.input-row label {
  width: 72px;
  flex-shrink: 0;
  font-size: 0.93rem;
  color: #aaa;
}
.input-row input[type="number"] {
  width: 128px;
  padding: 6.5px 8px;
  font-size: 1rem;
  border: 1px solid #444;
  border-radius: 2px;
  margin-right: 5px;
  background: #111;
  color: #fff;
}
.input-row select {
  padding: 6.5px 5px;
  font-size: 0.93rem;
  border: 1px solid #444;
  border-radius: 2px;
  background: #111;
  color: #fff;
  cursor: pointer;
}
button {
  background: #1a1a1a;
  color: #fff;
  border: 1px solid #555;
  padding: 8px 16px;
  font-size: 0.93rem;
  cursor: pointer;
  border-radius: 2px;
  margin-top: 0.25rem;
}
button:hover {
  background: #222;
}
.results {
  margin-top: 1rem;
  padding: 0.7rem 0.9rem;
  background: #111;
  border: 1px solid #333;
  border-radius: 2px;
  font-size: 0.93rem;
  line-height: 1.55;
  color: #fff;
}
.results div {
  margin-bottom: 0.15rem;
}
.results span {
  font-weight: 600;
  color: #fff;
}
</style>
</head>
<body>
<h1>BMI Calculator</h1>

<h2>Calculate BMI from weight &amp; height</h2>

<div class="input-row">
  <label for="bmi-height-val">Height</label>
  <input type="number" id="bmi-height-val" value="70" step="0.01" min="0">
  <select id="bmi-height-unit">
    <option value="in" selected>in</option>
    <option value="cm">cm</option>
  </select>
</div>

<div class="input-row">
  <label for="bmi-weight-val">Weight</label>
  <input type="number" id="bmi-weight-val" value="180" step="0.1" min="0">
  <select id="bmi-weight-unit">
    <option value="lbs" selected>lbs</option>
    <option value="kg">kg</option>
  </select>
</div>

<div id="bmi-results" class="results" style="display: none;">
  <div><strong>BMI:</strong> <span id="bmi-value"></span></div>
  <div><strong>Height:</strong> <span id="height-imp"></span> in (<span id="height-met"></span> cm)</div>
  <div><strong>Weight:</strong> <span id="weight-imp"></span> lbs (<span id="weight-met"></span> kg)</div>
</div>

<h2>Calculate weight from BMI &amp; height</h2>

<div class="input-row">
  <label for="weight-bmi-val">BMI</label>
  <input type="number" id="weight-bmi-val" value="25" step="0.01" min="0">
</div>

<div class="input-row">
  <label for="weight-height-val">Height</label>
  <input type="number" id="weight-height-val" value="70" step="0.01" min="0">
  <select id="weight-height-unit">
    <option value="in" selected>in</option>
    <option value="cm">cm</option>
  </select>
</div>

<div id="weight-results" class="results" style="display: none;">
  <div><strong>Weight:</strong> <span id="w-weight-lbs"></span> lbs (<span id="w-weight-kg"></span> kg)</div>
  <div><strong>Height:</strong> <span id="w-height-in"></span> in (<span id="w-height-cm"></span> cm)</div>
</div>

<script>
const LBS_TO_KG = 0.45359237;
const IN_TO_M = 0.0254;
const IN_TO_CM = 2.54;
const CM_TO_M = 0.01;

function calculateBMI() {
  const hVal = parseFloat(document.getElementById('bmi-height-val').value);
  const hUnit = document.getElementById('bmi-height-unit').value;
  const wVal = parseFloat(document.getElementById('bmi-weight-val').value);
  const wUnit = document.getElementById('bmi-weight-unit').value;

  if (isNaN(hVal) || isNaN(wVal) || hVal <= 0 || wVal <= 0) {
    return;
  }

  const height_m = (hUnit === 'in') ? hVal * IN_TO_M : hVal * CM_TO_M;
  const weight_kg = (wUnit === 'lbs') ? wVal * LBS_TO_KG : wVal;

  const bmi = weight_kg / (height_m * height_m);

  let height_in, height_cm;
  if (hUnit === 'in') {
    height_in = hVal;
    height_cm = hVal * IN_TO_CM;
  } else {
    height_cm = hVal;
    height_in = hVal / IN_TO_CM;
  }

  let weight_lbs, weight_kg_out;
  if (wUnit === 'lbs') {
    weight_lbs = wVal;
    weight_kg_out = wVal * LBS_TO_KG;
  } else {
    weight_kg_out = wVal;
    weight_lbs = wVal / LBS_TO_KG;
  }

  document.getElementById('bmi-value').textContent = bmi.toFixed(2);
  document.getElementById('height-imp').textContent = height_in.toFixed(2);
  document.getElementById('height-met').textContent = height_cm.toFixed(2);
  document.getElementById('weight-imp').textContent = weight_lbs.toFixed(2);
  document.getElementById('weight-met').textContent = weight_kg_out.toFixed(2);

  document.getElementById('bmi-results').style.display = 'block';
}

function calculateWeight() {
  const bmiVal = parseFloat(document.getElementById('weight-bmi-val').value);
  const hVal = parseFloat(document.getElementById('weight-height-val').value);
  const hUnit = document.getElementById('weight-height-unit').value;

  if (isNaN(bmiVal) || isNaN(hVal) || bmiVal <= 0 || hVal <= 0) {
    return;
  }

  const height_m = (hUnit === 'in') ? hVal * IN_TO_M : hVal * CM_TO_M;
  const weight_kg = bmiVal * height_m * height_m;
  const weight_lbs = weight_kg / LBS_TO_KG;

  const height_in = (hUnit === 'in') ? hVal : hVal / IN_TO_CM;
  const height_cm = (hUnit === 'in') ? hVal * IN_TO_CM : hVal;

  document.getElementById('w-weight-lbs').textContent = weight_lbs.toFixed(2);
  document.getElementById('w-weight-kg').textContent = weight_kg.toFixed(2);
  document.getElementById('w-height-in').textContent = height_in.toFixed(2);
  document.getElementById('w-height-cm').textContent = height_cm.toFixed(2);

  document.getElementById('weight-results').style.display = 'block';
}

// ===== Live calculation + Auto unit conversion =====

function convertValue(val, fromUnit, toUnit, kind) {
  if (fromUnit === toUnit) return val;
  if (kind === 'height') {
    if (fromUnit === 'in' && toUnit === 'cm') return val * 2.54;
    if (fromUnit === 'cm' && toUnit === 'in') return val / 2.54;
  } else if (kind === 'weight') {
    if (fromUnit === 'lbs' && toUnit === 'kg') return val * 0.45359237;
    if (fromUnit === 'kg' && toUnit === 'lbs') return val / 0.45359237;
  }
  return val;
}

function initUnitMemory() {
  const bmiH = document.getElementById('bmi-height-unit');
  const bmiW = document.getElementById('bmi-weight-unit');
  const wH   = document.getElementById('weight-height-unit');

  if (bmiH) bmiH.dataset.prevUnit = bmiH.value;
  if (bmiW) bmiW.dataset.prevUnit = bmiW.value;
  if (wH)   wH.dataset.prevUnit   = wH.value;
}

function setupBMILive() {
  const hInput  = document.getElementById('bmi-height-val');
  const wInput  = document.getElementById('bmi-weight-val');
  const hSelect = document.getElementById('bmi-height-unit');
  const wSelect = document.getElementById('bmi-weight-unit');

  function liveUpdate() {
    const hVal = parseFloat(hInput.value);
    const wVal = parseFloat(wInput.value);
    if (!isNaN(hVal) && hVal > 0 && !isNaN(wVal) && wVal > 0) {
      calculateBMI();
    }
  }

  // Live on typing
  [hInput, wInput].forEach(el => {
    if (el) {
      el.addEventListener('input', liveUpdate);
      el.addEventListener('change', liveUpdate);
    }
  });

  // Height unit change → auto-convert value then live update
  if (hSelect) {
    hSelect.addEventListener('change', () => {
      const oldU = hSelect.dataset.prevUnit || 'in';
      const newU = hSelect.value;
      const val = parseFloat(hInput.value);
      if (!isNaN(val) && val > 0) {
        const conv = convertValue(val, oldU, newU, 'height');
        hInput.value = conv.toFixed(2);
      }
      hSelect.dataset.prevUnit = newU;
      liveUpdate();
    });
  }

  // Weight unit change → auto-convert value then live update
  if (wSelect) {
    wSelect.addEventListener('change', () => {
      const oldU = wSelect.dataset.prevUnit || 'lbs';
      const newU = wSelect.value;
      const val = parseFloat(wInput.value);
      if (!isNaN(val) && val > 0) {
        const conv = convertValue(val, oldU, newU, 'weight');
        wInput.value = conv.toFixed(1);
      }
      wSelect.dataset.prevUnit = newU;
      liveUpdate();
    });
  }
}

function setupWeightLive() {
  const bmiInput = document.getElementById('weight-bmi-val');
  const hInput   = document.getElementById('weight-height-val');
  const hSelect  = document.getElementById('weight-height-unit');

  function liveUpdate() {
    const bVal = parseFloat(bmiInput.value);
    const hVal = parseFloat(hInput.value);
    if (!isNaN(bVal) && bVal > 0 && !isNaN(hVal) && hVal > 0) {
      calculateWeight();
    }
  }

  [bmiInput, hInput].forEach(el => {
    if (el) {
      el.addEventListener('input', liveUpdate);
      el.addEventListener('change', liveUpdate);
    }
  });

  if (hSelect) {
    hSelect.addEventListener('change', () => {
      const oldU = hSelect.dataset.prevUnit || 'in';
      const newU = hSelect.value;
      const val = parseFloat(hInput.value);
      if (!isNaN(val) && val > 0) {
        const conv = convertValue(val, oldU, newU, 'height');
        hInput.value = conv.toFixed(2);
      }
      hSelect.dataset.prevUnit = newU;
      liveUpdate();
    });
  }
}

function initLiveTool() {
  initUnitMemory();
  setupBMILive();
  setupWeightLive();

  // Show results immediately with default values
  setTimeout(() => {
    const h1 = parseFloat(document.getElementById('bmi-height-val').value);
    const w1 = parseFloat(document.getElementById('bmi-weight-val').value);
    if (!isNaN(h1) && h1 > 0 && !isNaN(w1) && w1 > 0) {
      calculateBMI();
    }

    const b2 = parseFloat(document.getElementById('weight-bmi-val').value);
    const h2 = parseFloat(document.getElementById('weight-height-val').value);
    if (!isNaN(b2) && b2 > 0 && !isNaN(h2) && h2 > 0) {
      calculateWeight();
    }
  }, 60);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLiveTool);
} else {
  initLiveTool();
}
</script>
</body>
</html>
